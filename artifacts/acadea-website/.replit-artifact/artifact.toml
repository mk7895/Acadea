kind = "web"
previewPath = "/"
title = "Acadea"
version = "1.0.0"
id = "artifacts/acadea-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23068

[services.development]
run = "pnpm --filter @workspace/acadea-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/acadea-website", "run", "build" ]
publicDir = "artifacts/acadea-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23068"
BASE_PATH = "/"
